basePath: /v1
definitions:
  main.authUserResponse:
    properties:
      organizations:
        items:
          $ref: '#/definitions/store.Organization'
        type: array
      user:
        $ref: '#/definitions/store.User'
    type: object
  main.createInvitePayload:
    properties:
      email:
        type: string
      role:
        enum:
        - admin
        - member
        type: string
    required:
    - email
    type: object
  main.createKeyPayload:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  main.createKeyResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      key:
        type: string
      name:
        type: string
      project_id:
        type: string
    type: object
  main.createProjectPayload:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  main.ingestAIPayload:
    properties:
      agent_run_id:
        type: string
      cost_usd:
        minimum: 0
        type: number
      error_message:
        maxLength: 2000
        type: string
      input_tokens:
        minimum: 0
        type: integer
      latency_ms:
        minimum: 0
        type: integer
      metadata:
        type: object
      model:
        maxLength: 200
        minLength: 1
        type: string
      output_tokens:
        minimum: 0
        type: integer
      provider:
        maxLength: 50
        type: string
      request_id:
        maxLength: 200
        type: string
      status:
        enum:
        - success
        - error
        - timeout
        type: string
      timestamp:
        type: string
      total_tokens:
        minimum: 0
        type: integer
    required:
    - model
    - status
    type: object
  main.ingestAgentRunFinishPayload:
    properties:
      duration_ms:
        minimum: 0
        type: integer
      loop_detected:
        type: boolean
      loop_step_index:
        minimum: 0
        type: integer
      output:
        maxLength: 100000
        type: string
      status:
        enum:
        - completed
        - failed
        type: string
      termination_reason:
        enum:
        - clean
        - max_steps_reached
        - context_limit
        - error
        - loop_detected
        - timeout
        type: string
      timestamp:
        type: string
      total_cost_usd:
        minimum: 0
        type: number
      total_steps:
        minimum: 0
        type: integer
      total_tokens:
        minimum: 0
        type: integer
    required:
    - status
    - timestamp
    type: object
  main.ingestAgentRunStartPayload:
    properties:
      agent_name:
        maxLength: 200
        minLength: 1
        type: string
      input:
        maxLength: 10000
        type: string
      metadata:
        type: object
      timestamp:
        type: string
    required:
    - agent_name
    type: object
  main.ingestAgentStepPayload:
    properties:
      agent_run_id:
        type: string
      content:
        maxLength: 100000
        type: string
      cost_usd:
        minimum: 0
        type: number
      metadata:
        type: object
      step_index:
        minimum: 0
        type: integer
      step_type:
        enum:
        - think
        - tool_call
        - tool_result
        - replan
        type: string
      timestamp:
        type: string
      tokens:
        minimum: 0
        type: integer
      tool_input:
        type: object
      tool_latency_ms:
        minimum: 0
        type: integer
      tool_name:
        maxLength: 200
        type: string
      tool_output:
        type: object
      tool_success:
        type: boolean
    required:
    - agent_run_id
    - step_type
    type: object
  main.ingestEventPayload:
    properties:
      duration_ms:
        minimum: 0
        type: integer
      error:
        maxLength: 2000
        type: string
      ip:
        type: string
      metadata:
        type: object
      method:
        enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
        type: string
      path:
        maxLength: 500
        minLength: 1
        type: string
      request_size_bytes:
        minimum: 0
        type: integer
      response_size_bytes:
        minimum: 0
        type: integer
      service:
        maxLength: 100
        minLength: 1
        type: string
      status_code:
        maximum: 599
        minimum: 100
        type: integer
      timestamp:
        type: string
      user_agent:
        maxLength: 500
        type: string
    required:
    - duration_ms
    - method
    - path
    - service
    - status_code
    type: object
  main.ingestMetricPayload:
    properties:
      host:
        maxLength: 200
        minLength: 1
        type: string
      labels:
        type: object
      metric_name:
        maxLength: 200
        minLength: 1
        type: string
      timestamp:
        type: string
      value:
        type: number
    required:
    - host
    - metric_name
    - value
    type: object
  main.ingestResponse:
    properties:
      id:
        type: string
      timestamp:
        type: string
    type: object
  main.loginPayload:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  main.registerPayload:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 100
        type: string
      password:
        maxLength: 200
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  main.updateOrgPayload:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  main.updateRolePayload:
    properties:
      role:
        enum:
        - admin
        - member
        type: string
    required:
    - role
    type: object
  store.APIKey:
    properties:
      created_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      project_id:
        type: string
    type: object
  store.AgentRun:
    properties:
      agent_name:
        type: string
      duration_ms:
        type: integer
      finished_at:
        type: string
      id:
        type: string
      input:
        type: string
      loop_detected:
        type: boolean
      loop_step_index:
        type: integer
      metadata:
        items:
          type: integer
        type: array
      output:
        type: string
      project_id:
        type: string
      status:
        type: string
      termination_reason:
        type: string
      timestamp:
        type: string
      total_cost_usd:
        type: number
      total_steps:
        type: integer
      total_tokens:
        type: integer
    type: object
  store.AgentStep:
    properties:
      agent_run_id:
        type: string
      content:
        type: string
      cost_usd:
        type: number
      id:
        type: string
      input_fingerprint:
        items:
          type: integer
        type: array
      metadata:
        items:
          type: integer
        type: array
      project_id:
        type: string
      step_index:
        type: integer
      step_type:
        type: string
      timestamp:
        type: string
      tokens:
        type: integer
      tool_input:
        items:
          type: integer
        type: array
      tool_latency_ms:
        type: integer
      tool_name:
        type: string
      tool_output:
        items:
          type: integer
        type: array
      tool_success:
        type: boolean
    type: object
  store.LoopHit:
    properties:
      fingerprint:
        items:
          type: integer
        type: array
      hits:
        type: integer
      step_indices:
        items:
          type: integer
        type: array
      tool_name:
        type: string
    type: object
  store.MemberWithUser:
    properties:
      created_at:
        type: string
      email:
        type: string
      name:
        type: string
      organization_id:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  store.Organization:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  store.OrganizationInvite:
    properties:
      accepted_at:
        type: string
      created_at:
        type: string
      email:
        type: string
      expires_at:
        type: string
      id:
        type: string
      organization_id:
        type: string
      role:
        type: string
    type: object
  store.Project:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      organization_id:
        type: string
    type: object
  store.RunBucket:
    properties:
      bucket:
        type: string
      completed:
        type: integer
      failed:
        type: integer
      loop:
        type: integer
      total:
        type: integer
    type: object
  store.RunHealthRow:
    properties:
      agent_name:
        type: string
      avg_cost_usd:
        type: number
      avg_tokens:
        type: number
      completed_runs:
        type: integer
      completion_rate:
        type: number
      loop_rate:
        type: number
      loop_runs:
        type: integer
      prev_total_runs:
        type: integer
      total_runs:
        type: integer
    type: object
  store.RunSummary:
    properties:
      avg_cost_usd:
        type: number
      avg_tokens:
        type: number
      completed_runs:
        type: integer
      completion_rate:
        type: number
      duration_p50_ms:
        type: integer
      duration_p95_ms:
        type: integer
      duration_p99_ms:
        type: integer
      loop_rate:
        type: number
      loop_runs:
        type: integer
      total_runs:
        type: integer
      total_steps:
        type: integer
      total_tool_calls:
        type: integer
      unique_agents:
        type: integer
      unique_tools:
        type: integer
    type: object
  store.StepTypeCount:
    properties:
      count:
        type: integer
      step_type:
        type: string
    type: object
  store.TerminationCount:
    properties:
      count:
        type: integer
      termination_reason:
        type: string
    type: object
  store.ToolStat:
    properties:
      call_count:
        type: integer
      fail_count:
        type: integer
      is_new:
        type: boolean
      p50_latency_ms:
        type: integer
      p95_latency_ms:
        type: integer
      p99_latency_ms:
        type: integer
      prev_call_count:
        type: integer
      success_count:
        type: integer
      success_rate:
        type: number
      tool_name:
        type: string
    type: object
  store.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_verified:
        type: boolean
      name:
        type: string
      verified_at:
        type: string
    type: object
info:
  contact: {}
  description: Unified observability platform for AI agents, APIs, and infrastructure.
  title: Keelwave API
  version: 0.0.1
paths:
  /admin/orgs:
    post:
      consumes:
      - application/json
      parameters:
      - description: name (string, required)
        in: body
        name: payload
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Organization'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Create an organization
      tags:
      - admin/orgs
  /admin/orgs/{orgID}:
    delete:
      description: Permanently deletes the org and all its projects, keys, and ingest
        data.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
      summary: Delete an organization
      tags:
      - admin/orgs
    patch:
      consumes:
      - application/json
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Update payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.updateOrgPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Organization'
        "400":
          description: Bad Request
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
      summary: Rename an organization
      tags:
      - admin/orgs
  /admin/orgs/{orgID}/invites:
    get:
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.OrganizationInvite'
            type: array
      summary: List pending invites for an organization
      tags:
      - admin/invites
    post:
      consumes:
      - application/json
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Invite payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.createInvitePayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.OrganizationInvite'
        "400":
          description: Bad Request
          schema: {}
        "403":
          description: Forbidden
          schema: {}
      summary: Invite a user to an organization
      tags:
      - admin/invites
  /admin/orgs/{orgID}/invites/{inviteID}:
    delete:
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Invite UUID
        in: path
        name: inviteID
        required: true
        type: string
      responses:
        "204":
          description: No Content
      summary: Cancel an invite
      tags:
      - admin/invites
  /admin/orgs/{orgID}/members:
    get:
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.MemberWithUser'
            type: array
        "403":
          description: Forbidden
          schema: {}
      summary: List org members
      tags:
      - admin/members
  /admin/orgs/{orgID}/members/{userID}:
    delete:
      description: Admin+. Cannot remove an owner or yourself.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Member user UUID
        in: path
        name: userID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
      summary: Remove a member from the org
      tags:
      - admin/members
  /admin/orgs/{orgID}/members/{userID}/role:
    patch:
      consumes:
      - application/json
      description: Owner only. Cannot change an owner's role or promote to owner.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Member user UUID
        in: path
        name: userID
        required: true
        type: string
      - description: Role payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.updateRolePayload'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "404":
          description: Not Found
          schema: {}
      summary: Update a member's role
      tags:
      - admin/members
  /admin/orgs/{orgID}/projects:
    get:
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Project'
            type: array
        "500":
          description: Internal Server Error
          schema: {}
      summary: Lists projects in an org
      tags:
      - admin/projects
    post:
      consumes:
      - application/json
      description: Creates a tenant project scoped to the org. Requires admin role.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Project payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.createProjectPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Project'
        "400":
          description: Bad Request
          schema: {}
        "403":
          description: Forbidden
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Creates a project
      tags:
      - admin/projects
  /admin/orgs/{orgID}/projects/{projectID}:
    delete:
      description: Deletes a project and cascades to its api_keys and ingest rows.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Deletes a project
      tags:
      - admin/projects
    get:
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Project'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Fetches a project
      tags:
      - admin/projects
  /admin/orgs/{orgID}/projects/{projectID}/keys:
    get:
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.APIKey'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Lists API keys for a project
      tags:
      - admin/keys
    post:
      consumes:
      - application/json
      description: Generates a new API key for a project. Plaintext key is returned
        ONCE. Requires admin role.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      - description: Key payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.createKeyPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.createKeyResponse'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Creates an API key
      tags:
      - admin/keys
  /admin/orgs/{orgID}/projects/{projectID}/keys/{keyID}:
    delete:
      description: Revokes an API key. Subsequent requests using this key will return
        401. Requires admin role.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      - description: Key UUID
        in: path
        name: keyID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Deletes an API key
      tags:
      - admin/keys
  /agent/health:
    get:
      description: 'Rolls up run outcomes per agent_name: total runs, completion rate,
        loop rate, avg cost, and avg tokens over the window.'
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.RunHealthRow'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Per-agent run-health rollup for the calling project
      tags:
      - agent
  /agent/runs:
    get:
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      - description: default 25, max 1000
        in: query
        name: limit
        type: integer
      - description: default 0
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.AgentRun'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List agent runs for the calling project
      tags:
      - agent
  /agent/runs/{runID}:
    get:
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: RFC3339; if set, lookup is bounded to a 2s window for fast chunk
          pruning
        in: query
        name: at
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AgentRun'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetch a single agent run by id
      tags:
      - agent
  /agent/runs/{runID}/loops:
    get:
      description: Returns each tool_name + input fingerprint repeated >= 2 times.
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: RFC3339 hint for chunk pruning
        in: query
        name: at
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.LoopHit'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Loop detection for an agent run
      tags:
      - agent
  /agent/runs/{runID}/steps:
    get:
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: RFC3339 hint for chunk pruning
        in: query
        name: at
        type: string
      - description: default 1000, max 1000
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.AgentStep'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List steps for an agent run, ordered by step_index asc
      tags:
      - agent
  /agent/runs/terminations:
    get:
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.TerminationCount'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Run counts grouped by termination reason
      tags:
      - agent
  /agent/runs/timeseries:
    get:
      description: Returns per-bucket run outcome counts (total, completed, failed,
        loop) via TimescaleDB time_bucket. bucket is one of 1h, 6h, 1d.
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      - description: 'bucket size: 1h (default), 6h, 1d'
        in: query
        name: bucket
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.RunBucket'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Bucketed run counts over time for the calling project
      tags:
      - agent
  /agent/steps/distribution:
    get:
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.StepTypeCount'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Step counts grouped by step_type
      tags:
      - agent
  /agent/summary:
    get:
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/store.RunSummary'
            type: object
      security:
      - ApiKeyAuth: []
      summary: Run summary + duration percentiles for the calling project, current
        vs previous window
      tags:
      - agent
  /agent/tools/stats:
    get:
      description: 'Aggregates tool calls across every run in the window: call count,
        success/fail counts, success rate, and p95 latency per tool.'
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.ToolStat'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Per-tool usage analytics for the calling project
      tags:
      - agent
  /auth/invites/{token}:
    get:
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.OrganizationInvite'
      summary: Get invite info by token (public — for the accept page)
      tags:
      - auth
  /auth/invites/{token}/accept:
    put:
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      responses:
        "204":
          description: No Content
      summary: Accept an invite (requires session)
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.loginPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.authUserResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Log in with email + password
      tags:
      - auth
  /auth/logout:
    post:
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema: {}
      summary: End the current session
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.authUserResponse'
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Get the current user and their organizations
      tags:
      - auth
  /auth/oauth/{provider}/callback:
    get:
      parameters:
      - description: OAuth provider (google, github)
        in: path
        name: provider
        required: true
        type: string
      - description: Authorization code
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state
        in: query
        name: state
        required: true
        type: string
      responses:
        "307":
          description: Temporary Redirect
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: OAuth provider callback — issues session and redirects to dashboard
      tags:
      - auth
  /auth/oauth/{provider}/start:
    get:
      parameters:
      - description: OAuth provider (google, github)
        in: path
        name: provider
        required: true
        type: string
      - description: Post-login redirect path
        in: query
        name: redirect
        type: string
      responses:
        "307":
          description: Temporary Redirect
        "404":
          description: Not Found
          schema: {}
      summary: Initiate OAuth login flow
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.registerPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.authUserResponse'
        "400":
          description: Bad Request
          schema: {}
        "409":
          description: Conflict
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Register a new user
      tags:
      - auth
  /auth/verify-email/{token}:
    get:
      parameters:
      - description: Verification token
        in: path
        name: token
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
      summary: Verify email via token from the verification link
      tags:
      - auth
  /health:
    get:
      consumes:
      - application/json
      description: Returns service status, version, and environment.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - meta
  /ingest/agent/runs:
    post:
      consumes:
      - application/json
      description: Opens a new agent run record with status="running". Returns id
        + timestamp; the client must pass both back to finish the run.
      parameters:
      - description: Run start payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestAgentRunStartPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Start an agent run
      tags:
      - ingest
  /ingest/agent/runs/{runID}/finish:
    post:
      consumes:
      - application/json
      description: Marks a run terminal and writes totals. timestamp must match the
        value returned at start (hypertable PK).
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: Run finish payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestAgentRunFinishPayload'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Finish an agent run
      tags:
      - ingest
  /ingest/agent/steps:
    post:
      consumes:
      - application/json
      description: Records one step in an agent loop. Server computes a SHA-256 fingerprint
        of tool_name + tool_input for loop detection and bumps the agent_tools registry
        when tool_name is present.
      parameters:
      - description: Step payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestAgentStepPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Append an agent step
      tags:
      - ingest
  /ingest/ai:
    post:
      consumes:
      - application/json
      description: 'Records one LLM call: model, token counts, cost, latency, status.
        project_id is derived from the API key.'
      parameters:
      - description: AI trace payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestAIPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Ingest an AI / LLM call trace
      tags:
      - ingest
  /ingest/events:
    post:
      consumes:
      - application/json
      description: 'Records one HTTP request: method, path, status, duration. project_id
        is derived from the API key.'
      parameters:
      - description: API event payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestEventPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Ingest an HTTP request event
      tags:
      - ingest
  /ingest/metrics:
    post:
      consumes:
      - application/json
      description: Records one infrastructure metric sample (cpu_percent, memory_used,
        etc.). project_id is derived from the API key.
      parameters:
      - description: Metric payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestMetricPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Ingest a host metric
      tags:
      - ingest
securityDefinitions:
  ApiKeyAuth:
    description: 'Format: "Bearer kw_<token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
