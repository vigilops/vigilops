basePath: /v1
definitions:
  main.createKeyPayload:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  main.createKeyResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      key:
        description: plaintext, returned ONCE on creation
        type: string
      name:
        type: string
      project_id:
        type: string
    type: object
  main.createProjectPayload:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  main.ingestAIPayload:
    type: object
  main.ingestAgentRunFinishPayload:
    properties:
      duration_ms:
        minimum: 0
        type: integer
      loop_detected:
        type: boolean
      loop_step_index:
        minimum: 0
        type: integer
      output:
        maxLength: 100000
        type: string
      status:
        enum:
        - completed
        - failed
        type: string
      termination_reason:
        enum:
        - clean
        - max_steps_reached
        - context_limit
        - error
        - loop_detected
        - timeout
        type: string
      timestamp:
        type: string
      total_cost_usd:
        minimum: 0
        type: number
      total_steps:
        minimum: 0
        type: integer
      total_tokens:
        minimum: 0
        type: integer
    required:
    - status
    - timestamp
    type: object
  main.ingestAgentRunStartPayload:
    type: object
  main.ingestAgentStepPayload:
    type: object
  main.ingestEventPayload:
    type: object
  main.ingestMetricPayload:
    type: object
  main.ingestResponse:
    properties:
      id:
        type: string
      timestamp:
        type: string
    type: object
  store.APIKey:
    properties:
      created_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      project_id:
        type: string
    type: object
  store.AgentRun:
    properties:
      agent_name:
        type: string
      duration_ms:
        type: integer
      finished_at:
        type: string
      id:
        type: string
      input:
        type: string
      loop_detected:
        type: boolean
      loop_step_index:
        type: integer
      metadata:
        items:
          type: integer
        type: array
      output:
        type: string
      project_id:
        type: string
      status:
        type: string
      termination_reason:
        type: string
      timestamp:
        type: string
      total_cost_usd:
        type: number
      total_steps:
        type: integer
      total_tokens:
        type: integer
    type: object
  store.AgentStep:
    properties:
      agent_run_id:
        type: string
      content:
        type: string
      cost_usd:
        type: number
      id:
        type: string
      input_fingerprint:
        items:
          type: integer
        type: array
      metadata:
        items:
          type: integer
        type: array
      project_id:
        type: string
      step_index:
        type: integer
      step_type:
        type: string
      timestamp:
        type: string
      tokens:
        type: integer
      tool_input:
        items:
          type: integer
        type: array
      tool_latency_ms:
        type: integer
      tool_name:
        type: string
      tool_output:
        items:
          type: integer
        type: array
      tool_success:
        type: boolean
    type: object
  store.LoopHit:
    properties:
      fingerprint:
        items:
          type: integer
        type: array
      hits:
        type: integer
      step_indices:
        items:
          type: integer
        type: array
      tool_name:
        type: string
    type: object
  store.Project:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  store.RunBucket:
    properties:
      bucket:
        type: string
      completed:
        type: integer
      failed:
        type: integer
      loop:
        type: integer
      total:
        type: integer
    type: object
  store.RunHealthRow:
    properties:
      agent_name:
        type: string
      avg_cost_usd:
        type: number
      avg_tokens:
        type: number
      completed_runs:
        type: integer
      completion_rate:
        type: number
      loop_rate:
        type: number
      loop_runs:
        type: integer
      total_runs:
        type: integer
    type: object
  store.ToolStat:
    properties:
      call_count:
        type: integer
      fail_count:
        type: integer
      p95_latency_ms:
        type: integer
      success_count:
        type: integer
      success_rate:
        type: number
      tool_name:
        type: string
    type: object
info:
  contact: {}
  description: Unified observability platform for AI agents, APIs, and infrastructure.
  title: Keelwave API
  version: 0.0.1
paths:
  /admin/keys/{keyID}:
    delete:
      consumes:
      - application/json
      description: Revokes an API key by UUID. Subsequent requests using this key
        will return 401.
      parameters:
      - description: Key UUID
        in: path
        name: keyID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Deletes an API key
      tags:
      - admin/keys
  /admin/projects:
    get:
      consumes:
      - application/json
      description: Returns all projects ordered by created_at desc.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Project'
            type: array
        "500":
          description: Internal Server Error
          schema: {}
      summary: Lists projects
      tags:
      - admin/projects
    post:
      consumes:
      - application/json
      description: Creates a tenant project; all ingest rows are scoped by project_id.
      parameters:
      - description: Project payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.createProjectPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Project'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Creates a project
      tags:
      - admin/projects
  /admin/projects/{projectID}:
    delete:
      consumes:
      - application/json
      description: Deletes a project and cascades to its api_keys and ingest rows.
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Deletes a project
      tags:
      - admin/projects
    get:
      consumes:
      - application/json
      description: Fetches a project by UUID.
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Project'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Fetches a project
      tags:
      - admin/projects
  /admin/projects/{projectID}/keys:
    get:
      consumes:
      - application/json
      description: Returns all API keys for a project ordered by created_at desc.
        Plaintext is never returned; only metadata and hash-derived ID.
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.APIKey'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Lists API keys
      tags:
      - admin/keys
    post:
      consumes:
      - application/json
      description: Generates a new API key for a project. Plaintext key is returned
        ONCE in the response; only the SHA-256 hash is stored.
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      - description: Key payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.createKeyPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.createKeyResponse'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      summary: Creates an API key
      tags:
      - admin/keys
  /agent/health:
    get:
      description: 'Rolls up run outcomes per agent_name: total runs, completion rate,
        loop rate, avg cost, and avg tokens over the window.'
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.RunHealthRow'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Per-agent run-health rollup for the calling project
      tags:
      - agent
  /agent/runs:
    get:
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      - description: default 25, max 1000
        in: query
        name: limit
        type: integer
      - description: default 0
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.AgentRun'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List agent runs for the calling project
      tags:
      - agent
  /agent/runs/{runID}:
    get:
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: RFC3339; if set, lookup is bounded to a 2s window for fast chunk
          pruning
        in: query
        name: at
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AgentRun'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetch a single agent run by id
      tags:
      - agent
  /agent/runs/{runID}/loops:
    get:
      description: Returns each tool_name + input fingerprint repeated >= 2 times.
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: RFC3339 hint for chunk pruning
        in: query
        name: at
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.LoopHit'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Loop detection for an agent run
      tags:
      - agent
  /agent/runs/{runID}/steps:
    get:
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: RFC3339 hint for chunk pruning
        in: query
        name: at
        type: string
      - description: default 1000, max 1000
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.AgentStep'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: List steps for an agent run, ordered by step_index asc
      tags:
      - agent
  /agent/runs/timeseries:
    get:
      description: Returns per-bucket run outcome counts (total, completed, failed,
        loop) via TimescaleDB time_bucket. bucket is one of 1h, 6h, 1d.
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      - description: 'bucket size: 1h (default), 6h, 1d'
        in: query
        name: bucket
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.RunBucket'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Bucketed run counts over time for the calling project
      tags:
      - agent
  /agent/tools/stats:
    get:
      description: 'Aggregates tool calls across every run in the window: call count,
        success/fail counts, success rate, and p95 latency per tool.'
      parameters:
      - description: RFC3339, default now - 30d
        in: query
        name: from
        type: string
      - description: RFC3339, default now
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.ToolStat'
            type: array
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Per-tool usage analytics for the calling project
      tags:
      - agent
  /health:
    get:
      consumes:
      - application/json
      description: Returns service status, version, and environment.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - meta
  /ingest/agent/runs:
    post:
      consumes:
      - application/json
      description: Opens a new agent run record with status="running". Returns id
        + timestamp; the client must pass both back to finish the run.
      parameters:
      - description: Run start payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestAgentRunStartPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Start an agent run
      tags:
      - ingest
  /ingest/agent/runs/{runID}/finish:
    post:
      consumes:
      - application/json
      description: Marks a run terminal and writes totals. timestamp must match the
        value returned at start (hypertable PK).
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: Run finish payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestAgentRunFinishPayload'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Finish an agent run
      tags:
      - ingest
  /ingest/agent/steps:
    post:
      consumes:
      - application/json
      description: Records one step in an agent loop. Server computes a SHA-256 fingerprint
        of tool_name + tool_input for loop detection and bumps the agent_tools registry
        when tool_name is present.
      parameters:
      - description: Step payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestAgentStepPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Append an agent step
      tags:
      - ingest
  /ingest/ai:
    post:
      consumes:
      - application/json
      description: 'Records one LLM call: model, token counts, cost, latency, status.
        project_id is derived from the API key.'
      parameters:
      - description: AI trace payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestAIPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Ingest an AI / LLM call trace
      tags:
      - ingest
  /ingest/events:
    post:
      consumes:
      - application/json
      description: 'Records one HTTP request: method, path, status, duration. project_id
        is derived from the API key.'
      parameters:
      - description: API event payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestEventPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Ingest an HTTP request event
      tags:
      - ingest
  /ingest/metrics:
    post:
      consumes:
      - application/json
      description: Records one infrastructure metric sample (cpu_percent, memory_used,
        etc.). project_id is derived from the API key.
      parameters:
      - description: Metric payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.ingestMetricPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.ingestResponse'
        "400":
          description: Bad Request
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Ingest a host metric
      tags:
      - ingest
securityDefinitions:
  ApiKeyAuth:
    description: 'Format: "Bearer vgl_<token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
