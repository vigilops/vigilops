# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    services:
      db:
        image: timescale/timescaledb:latest-pg18
        env:
          POSTGRES_USER: keelwave
          POSTGRES_PASSWORD: keelwave
          POSTGRES_DB: keelwave
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keelwave -d keelwave"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DB_ADDR: postgres://keelwave:keelwave@localhost:5432/keelwave?sslmode=disable
      TEST_DB_ADDR: postgres://keelwave:keelwave@localhost:5432/keelwave?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: useblacksmith/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install golang-migrate
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin migrate
          migrate -version

      - name: Run database migrations
        run: migrate -path=./cmd/migrate/migrations -database="$DB_ADDR" up

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
